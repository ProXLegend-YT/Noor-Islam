<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hadith Collection — Bukhari, Muslim, Riyad as-Salihin | Noor Islam</title>
<meta name="description" content="Browse and search authentic Hadith from Sahih al-Bukhari, Sahih Muslim, Riyad as-Salihin and Sunan Abu Dawood, with a daily hadith and bookmarking.">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0e4d3b">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<section class="hero" style="padding:70px 0 50px;">
  <div class="container text-center">
    <span class="eyebrow" style="justify-content:center;color:var(--gold-300)">Sunnah</span>
    <h1 class="hero-title" style="font-size:clamp(28px,4vw,44px);">Hadith Collection</h1>
    <p class="hero-sub">Authentic narrations from the four most trusted collections.</p>
  </div>
</section>

<section class="section" style="padding-top:40px;">
  <div class="container">

    <div class="card reveal" id="daily-hadith-card" style="margin-bottom:36px;background:linear-gradient(160deg,var(--emerald-900),var(--emerald-950));color:#fdf8ea;">
      <span class="eyebrow" style="color:var(--gold-300)">Hadith of the Day</span>
      <p id="daily-hadith-text" style="color:#fdf8ea;font-size:17px;"></p>
      <p id="daily-hadith-ref" style="color:rgba(253,248,234,.65);font-size:13px;margin:0;"></p>
    </div>

    <div class="search-bar" style="max-width:460px;margin-bottom:20px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="hadith-search" placeholder="Search hadith by keyword or narrator…">
    </div>
    <div class="filter-row" id="book-filters"></div>
    <div id="hadith-list" class="grid grid-2"></div>
  </div>
</section>

<div id="site-footer"></div>
<script src="data/hadiths.js"></script>
<script src="js/main.js"></script>
<script src="js/hadith.js"></script>
</body>
</html>
