<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islamic Videos — Recitation, Tafsir &amp; Nasheeds | Noor Islam</title>
<meta name="description" content="Discover Islamic videos: Quran recitation, tafsir, Islamic history, motivation, nasheeds and shorts.">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0e4d3b">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<section class="hero" style="padding:70px 0 50px;">
  <div class="container text-center">
    <span class="eyebrow" style="justify-content:center;color:var(--gold-300)">Watch &amp; Learn</span>
    <h1 class="hero-title" style="font-size:clamp(28px,4vw,44px);">Islamic Videos</h1>
    <p class="hero-sub">Recitation, tafsir, history, motivation, nasheeds and shorts.</p>
  </div>
</section>

<section class="section" style="padding-top:40px;">
  <div class="container">

    <div class="search-bar" style="max-width:460px;margin-bottom:20px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="video-search" placeholder="Search Islamic lectures on YouTube…">
    </div>
    <div class="filter-row" id="video-cats"></div>

    <div id="video-player-wrap" style="display:none;margin-bottom:30px;">
      <div style="position:relative;padding-top:56.25%;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-md);">
        <iframe id="video-player" style="position:absolute;inset:0;width:100%;height:100%;border:0;" allowfullscreen></iframe>
      </div>
    </div>

    <div class="grid grid-3" id="video-grid"></div>

    <div class="glass reveal" style="padding:26px;margin-top:40px;text-align:center;">
      <p style="margin-bottom:12px;">Want a live, trending grid pulled from YouTube's Data API? Add your own free API key below — it's stored only in your browser.</p>
      <div class="flex gap-8 justify-between" style="max-width:460px;margin:0 auto;">
        <input type="text" id="yt-key" placeholder="Paste YouTube Data API v3 key" style="flex:1;padding:12px 16px;border-radius:100px;border:1px solid var(--border);background:var(--surface);">
        <button class="btn btn-primary btn-sm" id="save-key">Save</button>
      </div>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="js/main.js"></script>
<script src="js/videos.js"></script>
</body>
</html>
