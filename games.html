<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islamic Mini Games — Memory Match &amp; Word Scramble | Noor Islam</title>
<meta name="description" content="Play fun Islamic mini games: match the 99 Names of Allah in a memory game, or unscramble Islamic terms against the clock.">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0e4d3b">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<section class="hero" style="padding:70px 0 50px;">
  <div class="container text-center">
    <span class="eyebrow" style="justify-content:center;color:var(--gold-300)">Play &amp; Learn</span>
    <h1 class="hero-title" style="font-size:clamp(28px,4vw,44px);">Islamic Mini Games</h1>
    <p class="hero-sub">A fun, faith-filled way to sharpen your knowledge.</p>
  </div>
</section>

<section class="section" style="padding-top:30px;">
  <div class="container">
    <div class="filter-row" id="game-tabs">
      <button class="filter-btn active" data-g="memory">🧠 Memory Match</button>
      <button class="filter-btn" data-g="scramble">🔤 Word Scramble</button>
    </div>

    <!-- MEMORY MATCH -->
    <div class="game-panel" id="panel-memory">
      <div class="card reveal" style="margin-bottom:20px;">
        <div class="flex justify-between items-center" style="flex-wrap:wrap;gap:10px;">
          <div>
            <h3 style="margin-bottom:2px;">Match the 99 Names</h3>
            <p style="margin:0;font-size:13.5px;">Flip two cards to match each Beautiful Name with its meaning.</p>
          </div>
          <div class="flex gap-12">
            <span class="chip chip-gold" id="memory-moves">Moves: 0</span>
            <span class="chip" id="memory-best">Best: —</span>
            <button class="btn btn-outline btn-sm" id="memory-restart">Restart</button>
          </div>
        </div>
      </div>
      <div id="memory-grid" class="grid" style="grid-template-columns:repeat(4,1fr);gap:12px;"></div>
    </div>

    <!-- WORD SCRAMBLE -->
    <div class="game-panel" id="panel-scramble" style="display:none;">
      <div class="card reveal text-center" style="max-width:520px;margin:0 auto;">
        <div class="flex justify-between items-center" style="margin-bottom:16px;">
          <span class="chip chip-gold" id="scramble-progress">Word 1 of 10</span>
          <span class="chip" id="scramble-score">Score: 0</span>
        </div>
        <p style="font-size:13px;color:var(--text-muted);" id="scramble-hint"></p>
        <div id="scramble-word" style="font-size:36px;font-weight:800;letter-spacing:6px;color:var(--primary);margin:20px 0;font-family:var(--font-display);"></div>
        <input type="text" id="scramble-input" placeholder="Type your answer…" style="text-align:center;text-transform:uppercase;">
        <div class="flex gap-12 justify-between" style="margin-top:16px;justify-content:center;">
          <button class="btn btn-primary" id="scramble-check">Check Answer</button>
          <button class="btn btn-outline" id="scramble-skip">Skip →</button>
        </div>
        <p id="scramble-feedback" style="margin-top:14px;font-weight:700;"></p>
      </div>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="data/names.js"></script>
<script src="js/main.js"></script>
<script src="js/games.js"></script>
</body>
</html>
