<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Read Qur'an Online — Arabic, Urdu &amp; English | Noor Islam</title>
<meta name="description" content="Read all 114 Surahs of the Qur'an with Arabic text, Urdu and English translation, audio recitation, bookmarks and verse sharing.">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Amiri+Quran&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0e4d3b">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<section class="hero" style="padding:70px 0 50px;">
  <div class="container">
    <span class="eyebrow" style="justify-content:center;color:var(--gold-300)">The Noble Qur'an</span>
    <h1 class="hero-title" style="font-size:clamp(28px,4vw,44px);">Read, Listen &amp; Reflect</h1>
    <p class="hero-sub">All 114 Surahs with Arabic script, Urdu and English translation, and audio recitation.</p>
  </div>
</section>

<section class="section" style="padding-top:40px;">
  <div class="container">

    <!-- Continue reading -->
    <div class="glass reveal" id="continue-card" style="display:none;padding:20px 26px;margin-bottom:30px;">
      <div class="flex justify-between items-center" style="flex-wrap:wrap;gap:12px;">
        <div>
          <span class="chip chip-gold">Continue Reading</span>
          <h4 id="continue-text" style="margin:8px 0 0;"></h4>
        </div>
        <button class="btn btn-primary btn-sm" id="continue-btn">Resume →</button>
      </div>
    </div>

    <div class="grid" style="grid-template-columns:340px 1fr;gap:30px;align-items:flex-start;">

      <!-- Surah list -->
      <aside class="card reveal" style="position:sticky;top:calc(var(--header-h) + 20px);max-height:78vh;display:flex;flex-direction:column;">
        <div class="search-bar" style="margin-bottom:16px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="surah-search" placeholder="Search Surah by name or number…">
        </div>
        <div id="surah-list" style="overflow-y:auto;flex:1;padding-right:4px;"></div>
      </aside>

      <!-- Reader -->
      <div>
        <div class="flex justify-between items-center" style="margin-bottom:20px;flex-wrap:wrap;gap:12px;">
          <div>
            <h2 id="reader-title" style="margin-bottom:4px;">Select a Surah</h2>
            <p id="reader-sub" style="margin:0;font-size:14px;"></p>
          </div>
          <div class="flex gap-8">
            <select id="translation-select" style="padding:10px 14px;border-radius:100px;border:1px solid var(--border);background:var(--surface);font-weight:700;font-size:13px;">
              <option value="en.sahih">English — Saheeh International</option>
              <option value="ur.jalandhry">Urdu — Jalandhry</option>
            </select>
          </div>
        </div>
        <div id="bismillah" style="text-align:center;font-family:var(--font-arabic);font-size:30px;color:var(--primary);margin:16px 0 30px;display:none;">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
        <div id="ayah-container"></div>
      </div>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="data/surahs.js"></script>
<script src="js/main.js"></script>
<script src="js/quran.js"></script>
</body>
</html>
