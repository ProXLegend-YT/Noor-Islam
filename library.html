<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islamic Library — Books on Seerah, Hadith &amp; Tafsir | Noor Islam</title>
<meta name="description" content="Browse a curated Islamic library covering Quran studies, Hadith, Seerah, Islamic history and knowledge, with a built-in PDF reader.">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0e4d3b">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<section class="hero" style="padding:70px 0 50px;">
  <div class="container text-center">
    <span class="eyebrow" style="justify-content:center;color:var(--gold-300)">Knowledge</span>
    <h1 class="hero-title" style="font-size:clamp(28px,4vw,44px);">Islamic Library</h1>
    <p class="hero-sub">A curated shelf of classical and contemporary Islamic works.</p>
  </div>
</section>

<section class="section" style="padding-top:40px;">
  <div class="container">
    <div class="search-bar" style="max-width:460px;margin-bottom:20px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="book-search" placeholder="Search books by title or author…">
    </div>
    <div class="filter-row" id="cat-filters"></div>
    <div class="grid grid-3" id="book-grid"></div>
  </div>
</section>

<section class="section section-alt">
  <div class="container">
    <div class="card reveal" style="max-width:720px;margin:0 auto;text-align:center;">
      <h3>Read Your Own PDF</h3>
      <p>Have a book or PDF you'd like to read here? Open it directly in your browser — nothing is uploaded anywhere, it stays on your device.</p>
      <input type="file" id="pdf-input" accept="application/pdf" style="margin:14px auto;display:block;">
      <div id="pdf-view" style="display:none;margin-top:20px;">
        <embed id="pdf-embed" type="application/pdf" width="100%" height="520" style="border-radius:12px;border:1px solid var(--border);">
      </div>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="data/content.js"></script>
<script src="js/main.js"></script>
<script src="js/library.js"></script>
</body>
</html>
